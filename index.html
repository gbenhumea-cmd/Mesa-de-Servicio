<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CSCO — Mesa de Servicio</title>
<meta name="theme-color" content="#0d1117">
<meta http-equiv="refresh" content="5;url=https://csco-mesa-de-servicio.web.app">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--s1:#161b22;--s2:#1c2128;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--yellow:#ffd60a;--font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;}
.screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 50% 40%,#1f1a05 0%,var(--bg) 60%);text-align:center;padding:24px;}
.card{display:flex;flex-direction:column;align-items:center;gap:18px;max-width:380px;}
.logo{width:84px;height:84px;border-radius:50%;background:var(--yellow);color:#1a1a1a;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:22px;letter-spacing:-1px;box-shadow:0 0 0 0 rgba(255,214,10,.6);animation:pulse 1.6s infinite;}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(255,214,10,.55);transform:scale(1);}
  70%{box-shadow:0 0 0 22px rgba(255,214,10,0);transform:scale(1.05);}
  100%{box-shadow:0 0 0 0 rgba(255,214,10,0);transform:scale(1);}
}
h1{font-size:18px;font-weight:600;letter-spacing:-.2px;}
p{font-size:13px;color:var(--text2);line-height:1.6;}
.count{font-family:var(--mono);font-size:12px;color:var(--text2);}
.count b{color:var(--yellow);}
.btn{margin-top:6px;background:var(--yellow);color:#1a1a1a;border:none;padding:11px 28px;border-radius:8px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block;transition:opacity .15s;}
.btn:hover{opacity:.85;}
</style>
</head>
<body>
<div class="screen">
  <div class="card">
    <div class="logo">CSCO</div>
    <h1>Sistema actualizado</h1>
    <p>Esta aplicación se ha movido a una nueva versión.<br>Serás redirigido automáticamente.</p>
    <div class="count">Redirigiendo en <b id="seconds">5</b> segundos…</div>
    <a class="btn" href="https://csco-mesa-de-servicio.web.app">Ir ahora</a>
  </div>
</div>
<script>
var seconds = 5;
var el = document.getElementById('seconds');
var target = 'https://csco-mesa-de-servicio.web.app';
var timer = setInterval(function(){
  seconds--;
  if (seconds <= 0) {
    clearInterval(timer);
    window.location.replace(target);
  } else {
    el.textContent = seconds;
  }
}, 1000);
</script>
</body>
</html>
