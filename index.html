<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CSCO — Mesa de Servicio</title>
<meta name="theme-color" content="#1a5276">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CSCO Mesa">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--s1:#161b22;--s2:#1c2128;--s3:#21262d;--border:#30363d;--border2:#3d444d;--accent:#1f6feb;--accent2:#388bfd;--ok:#238636;--ok2:#2ea043;--warn:#9e6a03;--warn2:#d29922;--danger:#b62324;--danger2:#f85149;--purple:#6e40c9;--purple2:#a371f7;--text:#e6edf3;--text2:#8b949e;--text3:#484f58;--radius:8px;--font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;}
::-webkit-scrollbar{width:6px;height:6px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
#screen-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 20% 50%,#0d2045 0%,var(--bg) 60%);}
.login-wrap{width:360px;}.login-brand{display:flex;align-items:center;gap:10px;margin-bottom:32px;}
.login-brand .ico{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;letter-spacing:-1px;}
.login-brand .name{font-size:17px;font-weight:600;letter-spacing:-.3px;}.login-brand .sub{font-size:11px;color:var(--text2);font-family:var(--mono);margin-top:2px;}
.login-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:28px;}
.login-card h2{font-size:18px;font-weight:600;margin-bottom:4px;}.login-card .hint{font-size:12px;color:var(--text2);margin-bottom:24px;}
.fg{margin-bottom:14px;}.fg label{display:block;font-size:11px;font-weight:500;color:var(--text2);margin-bottom:5px;letter-spacing:.3px;text-transform:uppercase;}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color .15s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent2);}.fg textarea{resize:vertical;min-height:80px;line-height:1.5;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);border:none;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s,background .15s;}
.btn:hover{opacity:.85;}.btn-primary{background:var(--accent);color:#fff;width:100%;justify-content:center;padding:10px;}
.btn-ok{background:var(--ok);color:#fff;}.btn-ghost{background:var(--s3);color:var(--text2);border:1px solid var(--border);}
.btn-danger{background:transparent;color:var(--danger2);border:1px solid var(--danger);}.btn-sm{padding:5px 12px;font-size:12px;}
.btn-purple{background:var(--purple);color:#fff;}.btn-orange{background:#b45309;color:#fff;}
.demo-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:14px;line-height:1.7;font-family:var(--mono);}
#screen-app{display:none;flex-direction:column;min-height:100vh;}
.topbar{height:52px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.tb-left{display:flex;align-items:center;gap:10px;}.tb-brand{font-size:14px;font-weight:600;letter-spacing:-.2px;}
.tb-sep{color:var(--text3);font-size:16px;}.tb-section{font-size:13px;color:var(--text2);}
.role-badge{font-size:10px;font-family:var(--mono);font-weight:500;letter-spacing:.5px;padding:2px 9px;border-radius:20px;text-transform:uppercase;}
.rb-agente{background:rgba(31,111,235,.15);color:var(--accent2);border:1px solid rgba(31,111,235,.3);}
.rb-supervisor{background:rgba(110,64,201,.15);color:var(--purple2);border:1px solid rgba(110,64,201,.3);}
.rb-tecnico{background:rgba(35,134,54,.15);color:#3fb950;border:1px solid rgba(35,134,54,.3);}
.rb-config{background:rgba(248,81,73,.15);color:#f85149;border:1px solid rgba(248,81,73,.3);}
.tb-right{display:flex;align-items:center;gap:10px;}.tb-user{font-size:12px;color:var(--text2);}
.btn-exit{background:none;border:1px solid var(--border);color:var(--text2);padding:4px 12px;border-radius:var(--radius);font-family:var(--font);font-size:12px;cursor:pointer;}
.btn-exit:hover{border-color:var(--text2);color:var(--text);}
.dev-banner{background:#9e6a03;color:#fff;text-align:center;font-size:11px;font-family:var(--mono);font-weight:600;padding:4px;letter-spacing:.5px;}
.layout{display:flex;flex:1;}.sidebar{width:200px;background:var(--s1);border-right:1px solid var(--border);padding:16px 8px;flex-shrink:0;}
.nav-group{margin-bottom:20px;}.nav-label{font-size:10px;color:var(--text3);font-weight:500;letter-spacing:.8px;text-transform:uppercase;padding:0 8px;margin-bottom:6px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:400;transition:all .15s;margin-bottom:2px;}
.nav-item:hover{background:var(--s3);color:var(--text);}.nav-item.active{background:rgba(31,111,235,.12);color:var(--accent2);}
.nav-item .ni-icon{font-size:14px;width:18px;text-align:center;}
.content{flex:1;padding:24px;overflow-y:auto;max-height:calc(100vh - 52px);}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.stat .n{font-size:30px;font-weight:600;font-family:var(--mono);line-height:1;}.stat .l{font-size:11px;color:var(--text2);margin-top:4px;}
.n-open{color:var(--warn2);}.n-prog{color:var(--accent2);}.n-done{color:#3fb950;}.n-cls{color:var(--text3);}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}.page-title{font-size:16px;font-weight:600;}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.fbtn{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;background:var(--s2);border:1px solid var(--border);color:var(--text2);transition:all .15s;font-family:var(--font);}
.fbtn.active,.fbtn:hover{background:var(--accent);border-color:var(--accent);color:#fff;}
.tkt-table{width:100%;border-collapse:collapse;}
.tkt-table th{text-align:left;font-size:11px;font-weight:500;color:var(--text2);letter-spacing:.4px;text-transform:uppercase;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--s1);}
.tkt-row{border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}.tkt-row:hover{background:var(--s2);}
.tkt-row td{padding:10px 12px;font-size:13px;vertical-align:middle;}
.folio{font-family:var(--mono);font-size:11px;color:var(--text3);}.tkt-title{font-weight:500;margin-bottom:2px;}.tkt-cliente{font-size:11px;color:var(--text2);}
.empty{text-align:center;padding:48px;color:var(--text3);}.empty .e-icon{font-size:32px;margin-bottom:10px;}
.badge{display:inline-block;font-size:10px;font-family:var(--mono);font-weight:500;padding:2px 8px;border-radius:4px;white-space:nowrap;}
.b-abierto{background:rgba(210,153,34,.12);color:var(--warn2);border:1px solid rgba(210,153,34,.2);}
.b-proceso{background:rgba(56,139,253,.12);color:var(--accent2);border:1px solid rgba(56,139,253,.2);}
.b-resuelto{background:rgba(63,185,80,.12);color:#3fb950;border:1px solid rgba(63,185,80,.2);}
.b-cerrado{background:rgba(72,79,88,.12);color:var(--text3);border:1px solid rgba(72,79,88,.2);}
.b-alta{background:rgba(248,81,73,.12);color:var(--danger2);}.b-media{background:rgba(210,153,34,.1);color:var(--warn2);}.b-baja{background:rgba(63,185,80,.1);color:#3fb950;}.b-sin{background:var(--s3);color:var(--text3);}
.form-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:760px;}
.form-card h3{font-size:15px;font-weight:600;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}.form-full{grid-column:1/-1;}.form-actions{margin-top:20px;display:flex;gap:10px;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto;}
.overlay.open{display:flex;}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:12px;width:100%;max-width:660px;margin:auto;animation:fadeUp .2s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.modal-hdr{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;}
.modal-hdr h3{font-size:15px;font-weight:600;}.modal-folio{font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:3px;}
.btn-cls{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;line-height:1;padding:2px 4px;}.btn-cls:hover{color:var(--text);}
.modal-body{padding:18px 22px;}.m-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.m-section{margin-bottom:16px;}.m-label{font-size:11px;color:var(--text2);font-weight:500;letter-spacing:.3px;text-transform:uppercase;margin-bottom:5px;}
.m-val{font-size:13px;line-height:1.5;}.m-box{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-size:13px;color:var(--text2);line-height:1.6;}
.m-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.history{margin-bottom:16px;}.history h4{font-size:12px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;}
.note{padding:9px 12px;border-radius:6px;margin-bottom:6px;font-size:12px;line-height:1.5;}
.note-agente{background:rgba(31,111,235,.07);border-left:3px solid var(--accent);}
.note-supervisor{background:rgba(110,64,201,.07);border-left:3px solid var(--purple);}
.note-sistema{background:var(--bg);border-left:3px solid var(--border);color:var(--text2);}
.note-tecnico{background:rgba(35,134,54,.07);border-left:3px solid var(--ok2);}
.note-meta{font-size:10px;color:var(--text3);margin-top:4px;font-family:var(--mono);}
.m-controls{border-top:1px solid var(--border);padding-top:16px;margin-top:4px;}
.m-controls h4{font-size:12px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px;}
.ctrl-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.btn-ot{width:100%;padding:9px;border-radius:var(--radius);border:1px dashed var(--ok2);background:rgba(35,134,54,.06);color:#3fb950;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;margin-bottom:12px;transition:all .15s;}
.btn-ot:hover{background:rgba(35,134,54,.14);border-style:solid;}
.btn-evidencia{width:100%;padding:10px;border-radius:var(--radius);border:1px dashed #b45309;background:rgba(180,83,9,.06);color:#fb923c;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;margin-bottom:10px;transition:all .15s;display:block;text-align:center;}
.btn-evidencia:hover{background:rgba(180,83,9,.14);border-style:solid;}
.ev-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-family:var(--mono);font-weight:500;padding:2px 8px;border-radius:4px;background:rgba(180,83,9,.12);color:#fb923c;border:1px solid rgba(180,83,9,.25);}
.foto-zona{border:2px dashed var(--border2);border-radius:8px;padding:20px 16px;text-align:center;cursor:pointer;transition:all .2s;display:block;}
.foto-zona:hover,.foto-zona.antes:hover{border-color:var(--accent2);background:rgba(56,139,253,.06);}
.foto-zona.despues:hover{border-color:#3fb950;background:rgba(63,185,80,.06);}
.foto-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-top:8px;}
.foto-card{position:relative;border-radius:6px;overflow:hidden;border:1px solid var(--border);background:var(--bg);}
.foto-card img{width:100%;height:95px;object-fit:cover;display:block;}
.foto-tipo{position:absolute;top:4px;left:4px;font-size:9px;font-family:var(--mono);font-weight:700;padding:2px 7px;border-radius:3px;}
.foto-tipo.antes{background:rgba(31,111,235,.9);color:#fff;}.foto-tipo.despues{background:rgba(35,134,54,.9);color:#fff;}
.foto-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.65);border:none;border-radius:3px;color:#f85149;cursor:pointer;font-size:13px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;line-height:1;}
.foto-desc-input{width:100%;padding:4px 7px;background:var(--s2);border:none;border-top:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:10px;outline:none;text-transform:uppercase;}
.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:13px;display:flex;align-items:center;gap:8px;transform:translateY(60px);opacity:0;transition:all .25s;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}.toast.t-ok{border-color:var(--ok2);color:#3fb950;}.toast.t-err{border-color:var(--danger2);color:var(--danger2);}
#ot-print{display:none;}
input[type="text"],input[type="number"],input[type="email"],input[type="password"],textarea{text-transform:uppercase;}
input[type="password"],input[type="email"],input#f-email,input#li-pass,input#li-user{text-transform:none!important;}
@media(max-width:700px){.sidebar{display:none;}.stats-row{grid-template-columns:1fr 1fr;}.form-grid{grid-template-columns:1fr;}.m-grid{grid-template-columns:1fr;}}
.dir-btn{position:fixed;bottom:24px;right:24px;z-index:200;background:var(--accent);color:#fff;border:none;border-radius:50%;width:48px;height:48px;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;transition:background .15s;}
.dir-btn:hover{background:var(--accent2);}
.dir-panel{position:fixed;bottom:82px;right:24px;z-index:200;background:var(--s1);border:1px solid var(--border);border-radius:12px;width:280px;box-shadow:0 8px 24px rgba(0,0,0,.5);display:none;flex-direction:column;overflow:hidden;}
.dir-panel.open{display:flex;}.dir-hdr{background:var(--accent);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;}
.dir-hdr span{font-size:13px;font-weight:600;color:#fff;}.dir-hdr button{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;line-height:1;}
.dir-search{padding:8px 12px;border-bottom:1px solid var(--border);}
.dir-search input{width:100%;padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;}
.dir-table{overflow-y:auto;max-height:280px;}
.dir-row{display:grid;grid-template-columns:70px 1fr;padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;font-size:12px;}
.dir-row:hover{background:var(--s3);}.dir-row .num{font-family:var(--mono);color:var(--accent2);font-weight:600;}.dir-row .nom{color:var(--text);}
.cfg-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:600px;margin-bottom:16px;}
.cfg-card h3{font-size:14px;font-weight:600;margin-bottom:4px;}.cfg-card .hint{font-size:12px;color:var(--text2);margin-bottom:16px;}
.cfg-section{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border);}.cfg-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.cfg-section h4{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px;}
.user-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;}
.user-row .u-name{flex:1;font-size:13px;}.user-row .u-role{font-size:11px;color:var(--text2);}
.danger-zone{background:rgba(248,81,73,.05);border:1px solid rgba(248,81,73,.2);border-radius:var(--radius);padding:16px;}.danger-zone h4{color:var(--danger2);}
.proy-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.proy-stat{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
.proy-stat .n{font-size:26px;font-weight:600;font-family:var(--mono);line-height:1;}.proy-stat .l{font-size:11px;color:var(--text2);margin-top:4px;}
.proy-table{width:100%;border-collapse:collapse;}
.proy-table th{text-align:left;font-size:11px;font-weight:500;color:var(--text2);letter-spacing:.4px;text-transform:uppercase;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--s1);}
.proy-row{border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}.proy-row:hover{background:var(--s2);}
.proy-row td{padding:10px 12px;font-size:13px;vertical-align:middle;}
.semaforo{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;}
.sem-verde{background:#3fb950;}.sem-amarillo{background:var(--warn2);}.sem-rojo{background:var(--danger2);}
.proy-progress{background:var(--s3);border-radius:4px;height:6px;width:100%;min-width:80px;}
.proy-progress-bar{height:6px;border-radius:4px;background:var(--accent2);transition:width .3s;}
.b-migracion{background:rgba(56,139,253,.12);color:var(--accent2);border:1px solid rgba(56,139,253,.2);}
.b-rollout{background:rgba(110,64,201,.12);color:var(--purple2);border:1px solid rgba(110,64,201,.2);}
.b-apertura{background:rgba(63,185,80,.12);color:#3fb950;border:1px solid rgba(63,185,80,.2);}
.b-remodelacion{background:rgba(210,153,34,.12);color:var(--warn2);border:1px solid rgba(210,153,34,.2);}
.b-activo{background:rgba(63,185,80,.1);color:#3fb950;}.b-pausado{background:rgba(210,153,34,.1);color:var(--warn2);}.b-terminado{background:rgba(72,79,88,.1);color:var(--text3);}
.suc-table{width:100%;border-collapse:collapse;margin-top:8px;}
.suc-table th{text-align:left;font-size:10px;font-weight:500;color:var(--text2);letter-spacing:.4px;text-transform:uppercase;padding:6px 10px;border-bottom:1px solid var(--border);}
.suc-row{border-bottom:1px solid var(--border);font-size:12px;}.suc-row td{padding:7px 10px;vertical-align:middle;}
.b-pendiente{background:rgba(72,79,88,.1);color:var(--text2);}.b-programada{background:rgba(56,139,253,.1);color:var(--accent2);}
.b-ejecutada{background:rgba(63,185,80,.1);color:#3fb950;}.b-cancelada{background:rgba(248,81,73,.1);color:var(--danger2);}
.b-documentada{background:rgba(63,185,80,.15);color:#3fb950;border:1px solid rgba(63,185,80,.3);}
</style>
</head>
<body>
<div id="screen-login">
  <div class="login-wrap">
    <div class="login-brand">
      <div class="ico">CS</div>
      <div><div class="name">CSCO Mesa de Servicio</div><div class="sub">Centro de Servicios en Comunicación</div></div>
    </div>
    <div class="login-card">
      <h2>Iniciar sesión</h2><p class="hint">Acceso exclusivo para personal CSCO</p>
      <div class="fg"><label>Usuario</label><input type="text" id="li-user" placeholder="usuario"></div>
      <div class="fg"><label>Contraseña</label><input type="password" id="li-pass" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn btn-primary" onclick="doLogin()">Entrar</button>
      
    </div>
  </div>
</div>
<div id="screen-app">
  
  <div class="topbar">
    <div class="tb-left"><div class="tb-brand">CSCO</div><span class="tb-sep">/</span><span class="tb-section">Mesa de Servicio</span><span class="role-badge" id="tb-role"></span></div>
    <div class="tb-right">
      <span class="tb-user" id="tb-user"></span>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbwnUgnQXuS-jhUUKPrjdTfSaEnDgDpU4YrUmZ5WYTlcaTz1Ybk8f4EPsbw3HeUxVcym/exec';
async function apiGet(a,p={}){try{let u=API_URL+'?action='+a;Object.entries(p).forEach(([k,v])=>u+='&'+k+'='+encodeURIComponent(v));const r=await fetch(u);return await r.json();}catch(e){return{ok:false,error:e.message};}}
async function apiPost(b){try{const a=b.action;let d={};
if(a==='crearTicket')d=b.ticket;if(a==='actualizarTicket')d=b.ticket;if(a==='agregarNota')d={ticketId:b.ticketId,nota:b.nota};
if(a==='crearProyecto')d=b.ticket;if(a==='actualizarProyecto')d=b.proy;if(a==='actualizarSucursal')d=b.data;
if(a==='agregarSucursal')d=b.data;if(a==='agregarTecnico')d=b.data;if(a==='eliminarTecnico')d=b.data;
if(a==='agregarCliente')d=b.data;if(a==='eliminarCliente')d=b.data;if(a==='subirFotos')d=b.data;
const u=API_URL+'?action='+a+'&d='+encodeURIComponent(JSON.stringify(d));const r=await fetch(u);return await r.json();}catch(e){return{ok:false,error:e.message};}}
const USERS={agente:{pass:'1234',role:'agente',name:'Recepción / Agente',color:'rb-agente'},supervisor:{pass:'1234',role:'supervisor',name:'Supervisor',color:'rb-supervisor'},tecnico:{pass:'1234',role:'tecnico',name:'Técnico',color:'rb-tecnico'},config:{pass:'1234',role:'config',name:'Administrador',color:'rb-supervisor',hidden:true}};
let DIRECTORIO=[{num:'100',nombre:'ARTURO',tel:''},{num:'101',nombre:'ALEXIS',tel:''},{num:'102',nombre:'BRANDON',tel:''},{num:'103',nombre:'LUIS',tel:''},{num:'104',nombre:'VICTOR',tel:''},{num:'105',nombre:'PEDRO',tel:''}];
let CLIENTES=[],session=null,tecnicoNumero='',tickets=[],folioNum=1,activeFilter='Todos',activeTecFilter='',activePage='',proyectos=[];
function now(){return new Date().toLocaleString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function nota(t,x,a=''){return{tipo:t,texto:x,autor:a,fecha:now()};}

// ══════════════════════════════════════════════════════════
// NOTIFICACIONES — Correo (Apps Script) + Push (PWA)
// ══════════════════════════════════════════════════════════
async function registrarSW(){
  if('serviceWorker' in navigator){
    try{
      const reg=await navigator.serviceWorker.register('./sw.js');
      console.log('SW registrado:',reg.scope);
      return reg;
    }catch(e){console.log('SW no disponible:',e.message);return null;}
  }
  return null;
}

async function pedirPermisoNotificaciones(){
  if(!('Notification' in window)){return false;}
  if(Notification.permission==='granted'){
    // Ya tenemos permiso, ocultar botón
    const btn=document.getElementById('btn-notif');if(btn)btn.style.display='none';
    return true;
  }
  if(Notification.permission==='denied'){return false;}
  // Mostrar botón 🔔 para que el usuario lo active manualmente (requerido en iOS)
  const btn=document.getElementById('btn-notif');if(btn)btn.style.display='inline-flex';
  return false;
}

async function activarNotificaciones(){
  if(!('Notification' in window)){showToast('Notificaciones no disponibles en este dispositivo','err');return;}
  const perm=await Notification.requestPermission();
  if(perm==='granted'){
    showToast('✓ Notificaciones activadas','ok');
    const btn=document.getElementById('btn-notif');if(btn)btn.style.display='none';
  } else {
    showToast('Notificaciones no permitidas','err');
  }
}

function mostrarNotificacionLocal(ticket){
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  const titulo='🔔 Nuevo ticket: '+ticket.id;
  const cuerpo=ticket.empresa+' — '+ticket.contacto+'\n'+ticket.desc.substring(0,80)+(ticket.desc.length>80?'…':'');
  try{
    const n=new Notification(titulo,{
      body:cuerpo,
      icon:'./icon.jpeg',
      badge:'./icon.jpeg',
      tag:'ticket-'+ticket.id,
      requireInteraction:true,
      vibrate:[200,100,200]
    });
    n.onclick=function(){window.focus();n.close();};
    setTimeout(()=>{try{n.close();}catch(e){}},30000);
  }catch(e){
    // Si falla la notificación directa (algunos navegadores), intentar via SW
    if('serviceWorker' in navigator){
      navigator.serviceWorker.ready.then(reg=>{
        reg.showNotification(titulo,{
          body:cuerpo,
          icon:'./icon.jpeg',
          tag:'ticket-'+ticket.id,
          requireInteraction:true,
          vibrate:[200,100,200],
          data:{url:'./'}
        });
      }).catch(()=>{});
    }
  }
}

// Registrar Service Worker al cargar
window.addEventListener('load',()=>{registrarSW();});

async function doLogin(){
  const u=document.getElementById('li-user').value.trim().toLowerCase();const p=document.getElementById('li-pass').value;const usr=USERS[u];
  if(!usr||usr.pass!==p){showToast('Usuario o contraseña incorrectos','err');return;}
  session={key:u,...usr};
  document.getElementById('screen-login').style.display='none';document.getElementById('screen-app').style.display='flex';
  document.getElementById('tb-role').textContent=session.role.toUpperCase();document.getElementById('tb-role').className='role-badge '+session.color;
  document.getElementById('tb-user').textContent=session.name;buildSidebar();
  if(session.role==='config')navTo('config');
  else if(session.role==='tecnico')renderPedirNumero();
  else{showToast('Cargando tickets...','ok');try{await cargarCatalogos();}catch(e){}await cargarTickets();navTo('tickets');
    // Pedir permiso de notificaciones al entrar (agente y supervisor)
    pedirPermisoNotificaciones();
  }
}
function renderPedirNumero(){
  document.getElementById('content').innerHTML=`<div style="max-width:360px;margin:60px auto;"><div style="background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:28px;"><h3 style="font-size:15px;font-weight:600;margin-bottom:6px;">Identificación del técnico</h3><p style="font-size:12px;color:var(--text2);margin-bottom:20px;">Ingresa tu número de empleado.</p><div style="margin-bottom:14px;"><label style="display:block;font-size:11px;font-weight:500;color:var(--text2);letter-spacing:.3px;text-transform:uppercase;margin-bottom:5px;">No. de Empleado</label><input type="text" id="num-emp-input" placeholder="Ej: 001" onkeydown="if(event.key==='Enter')confirmarNumero()" style="width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;"></div><button class="btn btn-ok" style="width:100%;justify-content:center;padding:10px;" onclick="confirmarNumero()">Ver mis tickets</button><button class="btn btn-ghost" style="width:100%;justify-content:center;padding:8px;margin-top:8px;" onclick="confirmarNumero(true)">Ver todos</button></div></div>`;
  setTimeout(()=>{const el=document.getElementById('num-emp-input');if(el)el.focus();},100);
}
async function confirmarNumero(v=false){
  if(!v){const el=document.getElementById('num-emp-input');const n=el?el.value.trim():'';if(!n){showToast('Ingresa tu número','err');return;}tecnicoNumero=n.trim().toUpperCase();session.name='Técnico '+n.trim();document.getElementById('tb-user').textContent=session.name;}else tecnicoNumero='';
  showToast('Cargando tickets...','ok');await cargarTickets();navTo('tickets');
}
async function cargarTickets(){const r=await apiGet('getTickets');if(r.ok&&Array.isArray(r.data)){tickets=r.data;folioNum=tickets.length+1;}else showToast('Sin conexión — modo local','err');}
function doLogout(){session=null;tecnicoNumero='';document.getElementById('dir-btn').style.display='none';document.getElementById('dir-panel').classList.remove('open');document.getElementById('screen-login').style.display='flex';document.getElementById('screen-app').style.display='none';document.getElementById('li-pass').value='';}
function buildSidebar(){
  const r=session.role;const db=document.getElementById('dir-btn');if(db)db.style.display=r==='supervisor'?'flex':'none';
  let nav='';
  if(r==='agente')nav=`<div class="nav-group"><div class="nav-label">Tickets</div><div class="nav-item" id="nav-nuevo" onclick="navTo('nuevo')"><span class="ni-icon">＋</span>Nuevo ticket</div><div class="nav-item" id="nav-tickets" onclick="navTo('tickets')"><span class="ni-icon">◈</span>Todos los tickets</div></div><div class="nav-group"><div class="nav-label">Proyectos</div><div class="nav-item" id="nav-proyectos" onclick="navTo('proyectos')"><span class="ni-icon">▦</span>Mesa de Proyectos</div><div class="nav-item" id="nav-nuevo-proyecto" onclick="navTo('nuevo-proyecto')"><span class="ni-icon">＋</span>Nuevo proyecto</div></div>`;
  else if(r==='supervisor')nav=`<div class="nav-group"><div class="nav-label">Panel</div><div class="nav-item" id="nav-tickets" onclick="navTo('tickets')"><span class="ni-icon">◈</span>Tickets</div><div class="nav-item" id="nav-nuevo" onclick="navTo('nuevo')"><span class="ni-icon">＋</span>Nuevo ticket</div></div><div class="nav-group"><div class="nav-label">Proyectos</div><div class="nav-item" id="nav-proyectos" onclick="navTo('proyectos')"><span class="ni-icon">▦</span>Mesa de Proyectos</div><div class="nav-item" id="nav-nuevo-proyecto" onclick="navTo('nuevo-proyecto')"><span class="ni-icon">＋</span>Nuevo proyecto</div></div>`;
  else if(r==='config')nav=`<div class="nav-group"><div class="nav-label">Sistema</div><div class="nav-item" id="nav-config" onclick="navTo('config')"><span class="ni-icon">⚙</span>Configuración</div><div class="nav-item" id="nav-tickets" onclick="navTo('tickets')"><span class="ni-icon">◈</span>Ver tickets</div></div>`;
  else nav=`<div class="nav-group"><div class="nav-label">Mi trabajo</div><div class="nav-item" id="nav-tickets" onclick="navTo('tickets')"><span class="ni-icon">◈</span>Mis asignaciones</div></div>`;
  document.getElementById('sidebar').innerHTML=nav;
}
function navTo(page){
  activePage=page;document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const b=document.getElementById('nav-'+page.split(':')[0]);if(b)b.classList.add('active');
  if(page==='nuevo')renderNuevo();else if(page==='tickets')renderTickets();else if(page==='config')renderConfig();
  else if(page==='proyectos')renderProyectos();else if(page==='nuevo-proyecto')renderNuevoProyecto();
  else if(page.startsWith('detalle-proyecto:'))renderDetalleProyecto(page.split(':')[1]);
}
function renderNuevo(){
  const co=CLIENTES.length?'<option value="">— Seleccionar contacto —</option>'+CLIENTES.map(c=>`<option value="${c.id}">${c.contacto} (${c.empresa||'—'})</option>`).join(''):'<option value="">— Sin contactos —</option>';
  document.getElementById('content').innerHTML=`<div class="page-header"><div class="page-title">Nuevo ticket de servicio</div></div><div class="form-card"><h3>Datos de la solicitud</h3><div class="form-grid"><div class="fg form-full"><label>Contacto del catálogo</label><select id="f-cliente-cat" onchange="llenarContacto(this.value)" style="text-transform:none!important;">${co}</select></div><div class="fg"><label>Empresa / Marca *</label><input type="text" id="f-empresa" placeholder="Nombre de la empresa"></div><div class="fg"><label>Persona de contacto *</label><input type="text" id="f-contacto" placeholder="Nombre de quien reporta"></div><div class="fg"><label>Teléfono</label><input type="text" id="f-tel" placeholder="55 1234 5678"></div><div class="fg"><label>Correo electrónico</label><input type="email" id="f-email" placeholder="contacto@empresa.com"></div><div class="fg"><label>Canal de reporte *</label><select id="f-canal"><option>Teléfono</option><option>WhatsApp</option><option>Correo</option><option>Visita presencial</option><option>Otro</option></select></div><div class="fg"><label>Prioridad *</label><select id="f-prio"><option value="Alta">🔴 Alta</option><option value="Media" selected>🟡 Media</option><option value="Baja">🟢 Baja</option></select></div><div class="fg"><label>Sucursal</label><input type="text" id="f-sucursal" placeholder="Nombre o número"></div><div class="fg"><label>Centro de costo</label><input type="text" id="f-ceco" placeholder="Opcional"></div><div class="fg"><label>Ticket del cliente</label><input type="text" id="f-ticketcliente" placeholder="Referencia del cliente (opcional)"></div><div class="fg form-full"><label>Ubicación / Dirección</label><input type="text" id="f-dir" placeholder="Dirección o referencia"></div><div class="fg form-full"><label>Indicaciones para el técnico</label><input type="text" id="f-indic" placeholder="Ej: Trabajo después de las 10pm..."></div><div class="fg form-full"><label>Descripción del problema *</label><textarea id="f-desc" rows="4" placeholder="Describe con detalle..."></textarea></div></div><div class="form-actions"><button class="btn btn-ok" onclick="crearTicket()">Crear ticket</button><button class="btn btn-ghost" onclick="limpiarForm()">Limpiar</button></div></div>`;
}
function llenarContacto(id){if(!id)return;const c=CLIENTES.find(x=>x.id===id);if(!c)return;document.getElementById('f-contacto').value=c.contacto||'';document.getElementById('f-tel').value=c.tel||'';document.getElementById('f-email').value=c.email||'';}
function limpiarForm(){['f-empresa','f-contacto','f-tel','f-email','f-sucursal','f-ceco','f-ticketcliente','f-dir','f-indic','f-desc'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});const cat=document.getElementById('f-cliente-cat');if(cat)cat.value='';window._tecnicoNum='';window._tecnicoName='';}
async function crearTicket(){
  const empresa=document.getElementById('f-empresa').value.trim();const contacto=document.getElementById('f-contacto').value.trim();const desc=document.getElementById('f-desc').value.trim();const email=document.getElementById('f-email').value.trim();
  if(!empresa||!contacto||!desc){showToast('Empresa, contacto y descripción son obligatorios','err');return;}
  if(email&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showToast('Correo inválido','err');return;}
  const t={id:'',empresa,contacto,tel:document.getElementById('f-tel').value.trim(),email,canal:document.getElementById('f-canal').value,prioridad:document.getElementById('f-prio').value,sucursal:document.getElementById('f-sucursal').value.trim().toUpperCase(),ceco:document.getElementById('f-ceco').value.trim().toUpperCase(),ticketcliente:document.getElementById('f-ticketcliente').value.trim().toUpperCase(),dir:document.getElementById('f-dir').value.trim(),indic:document.getElementById('f-indic').value.trim(),supInstruc:'',desc:desc.toUpperCase(),estatus:'Abierto',tecnico:window._tecnicoNum||'',tecnicoName:window._tecnicoName||'',otFolio:'',otFecha:'',evidencia:null,creadoPor:session.name,fecha:now(),notas:[nota('sistema','Ticket creado por '+session.name+'.')]};
  showToast('Guardando...','ok');const res=await apiPost({action:'crearTicket',ticket:t});
  if(res.ok){
    t.id=res.data.id;tickets.unshift(t);limpiarForm();
    showToast('Ticket '+t.id+' creado — correo enviado','ok');
    // Mostrar notificación push en el celular
    mostrarNotificacionLocal(t);
    if(session.role==='supervisor')openModal(t.id);
  }
  else showToast('Error: '+res.error,'err');
}
function renderTickets(){
  const r=session.role;let lista=tickets;
  if(r==='tecnico'&&tecnicoNumero){const n=String(tecnicoNumero).trim().replace(/^0+/,'')||'0';lista=tickets.filter(t=>{const tn=String(t.tecnico||'').trim().replace(/^0+/,'')||'0';return tn===n;});}
  let sh='';
  if(r!=='tecnico'){const ab=tickets.filter(t=>t.estatus==='Abierto').length,pr=tickets.filter(t=>t.estatus==='En proceso').length,rs=tickets.filter(t=>t.estatus==='Resuelto').length,cl=tickets.filter(t=>t.estatus==='Cerrado').length;
    sh=`<div class="stats-row"><div class="stat"><div class="n n-open">${ab}</div><div class="l">Abiertos</div></div><div class="stat"><div class="n n-prog">${pr}</div><div class="l">En proceso</div></div><div class="stat"><div class="n n-done">${rs}</div><div class="l">Resueltos</div></div><div class="stat"><div class="n n-cls">${cl}</div><div class="l">Cerrados</div></div></div>`;}
  const fh=['Todos','Abierto','En proceso','Resuelto','Cerrado'].map(f=>`<button class="fbtn${activeFilter===f?' active':''}" onclick="setFilter('${f}')">${f}</button>`).join('');
  let filtered=activeFilter==='Todos'?lista:lista.filter(t=>t.estatus===activeFilter);
  if(activeTecFilter){const tf=activeTecFilter.trim().toLowerCase();filtered=filtered.filter(t=>String(t.tecnico||'').toLowerCase().includes(tf)||String(t.tecnicoName||'').toLowerCase().includes(tf));}
  let rows='';
  if(!filtered.length)rows=`<tr><td colspan="7"><div class="empty"><div class="e-icon">📋</div>Sin tickets en este filtro</div></td></tr>`;
  else rows=filtered.map(t=>{
    const ev=t.evidencia&&t.evidencia.fotos&&t.evidencia.fotos.length?`<span class="ev-badge" style="margin-left:4px;">📷${t.evidencia.fotos.length}</span>`:'';
    return`<tr class="tkt-row" onclick="openModal('${t.id}')"><td><div class="folio">${t.id}</div></td><td><div class="tkt-title">${t.empresa}</div><div class="tkt-cliente">${t.contacto}</div></td><td style="max-width:220px;color:var(--text2);font-size:12px;">${t.desc.substring(0,60)}${t.desc.length>60?'…':''}</td><td><span class="badge b-${t.prioridad.toLowerCase()}">${t.prioridad}</span></td><td><span class="badge b-${sk(t.estatus)}">${t.estatus}</span>${ev}${t.estatus==="Resuelto"&&t.evidencia&&t.evidencia.fotos&&t.evidencia.fotos.length?'<span style="margin-left:4px;font-size:10px;font-family:var(--mono);font-weight:600;padding:2px 7px;border-radius:4px;background:rgba(210,153,34,.15);color:var(--warn2);border:1px solid rgba(210,153,34,.3);">⏳ Revisar</span>':""}</td><td style="font-size:12px;color:var(--text2);">${t.tecnico?`<span style="font-family:var(--mono);color:var(--accent2);margin-right:4px;">${t.tecnico}</span>`:''  }${t.tecnicoName||'<span style="color:var(--text3)">Sin asignar</span>'}</td><td style="font-size:11px;color:var(--text3);font-family:var(--mono);">${t.fecha}</td></tr>`;}).join('');
  const title=r==='tecnico'?'Mis asignaciones':'Todos los tickets';
  const addBtn=(r==='agente'||r==='supervisor')?`<button class="btn btn-ok btn-sm" onclick="navTo('nuevo')">＋ Nuevo ticket</button>`:'';
  document.getElementById('content').innerHTML=`${sh}<div class="page-header"><div class="page-title">${title}</div>${addBtn}</div><div class="filters">${fh}</div><div style="display:flex;justify-content:flex-end;align-items:center;gap:6px;margin-bottom:12px;"><span style="font-size:11px;color:var(--text2);">Filtrar por técnico:</span><input type="text" id="filtro-tec" placeholder="No. empleado o nombre" style="width:180px;padding:5px 10px;background:var(--bg);border:1px solid var(--border);border-radius:20px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;" onkeydown="if(event.key==='Enter'){activeTecFilter=this.value;renderTickets();}"><button class="fbtn" style="padding:5px 12px;" onclick="activeTecFilter=document.getElementById('filtro-tec').value;renderTickets();">Buscar</button><button class="fbtn" style="padding:5px 10px;" onclick="activeTecFilter='';document.getElementById('filtro-tec').value='';renderTickets();">✕</button></div><table class="tkt-table"><thead><tr><th>Folio</th><th>Cliente</th><th>Descripción</th><th>Prioridad</th><th>Estatus</th><th>Técnico</th><th>Fecha</th></tr></thead><tbody>${rows}</tbody></table>`;
}
function sk(s){if(s==='Abierto')return'abierto';if(s==='En proceso')return'proceso';if(s==='Resuelto')return'resuelto';return'cerrado';}
function setFilter(f){activeFilter=f;renderTickets();}
function openModal(id){
  const t=tickets.find(x=>x.id===id);if(!t)return;const r=session.role;
  const nh=t.notas.map(n=>`<div class="note note-${n.tipo}">${n.texto}<div class="note-meta">${n.autor?n.autor+' · ':''}${n.fecha}</div></div>`).join('');
  let otSec='';if(t.otFolio)otSec=`<div class="m-section"><div class="m-label">Orden de Trabajo</div><div style="display:flex;gap:8px;align-items:center;"><span class="badge" style="background:rgba(63,185,80,.1);color:#3fb950;border:1px solid rgba(63,185,80,.2);">${t.otFolio}</span><span style="font-size:11px;color:var(--text2);">Generada: ${t.otFecha}</span><button class="btn btn-ghost btn-sm" onclick="imprimirOT('${t.id}')">🖨 OT</button></div></div>`;
  let evSec='';
  if(t.evidencia&&t.evidencia.fotos&&t.evidencia.fotos.length){
    const fa=t.evidencia.fotos.filter(f=>f.tipo==='antes'),fd=t.evidencia.fotos.filter(f=>f.tipo==='despues');

async function asignarTecnico(id){
  const t=tickets.find(x=>x.id===id);if(!t)return;

async function generarOT(id){

function procesarFotos(input,tipo){
  const files=Array.from(input.files);if(!files.length)return;
  if(_evFotos.length+files.length>30){showToast('Máximo 30 fotos','err');return;}
  let procesadas=0;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=function(e){
      const img=new Image();
      img.onload=function(){
        const canvas=document.createElement('canvas');
        const esVertical=img.height>img.width;
        let srcW=img.width,srcH=img.height;
        let canvW=esVertical?srcH:srcW;
        let canvH=esVertical?srcW:srcH;
        const MW=1200,MH=900;
        let scale=1;
        if(canvW>MW)scale=MW/canvW;
        if(canvH*scale>MH)scale=MH/canvH;
        canvW=Math.round(canvW*scale);canvH=Math.round(canvH*scale);
        canvas.width=canvW;canvas.height=canvH;
        const ctx=canvas.getContext('2d');
        if(esVertical){ctx.save();ctx.translate(canvW/2,canvH/2);ctx.rotate(Math.PI/2);ctx.drawImage(img,-canvH/2,-canvW/2,canvH,canvW);ctx.restore();}
        else{ctx.drawImage(img,0,0,canvW,canvH);}
        _evFotos.push({tipo,dataUrl:canvas.toDataURL('image/jpeg',0.82),descripcion:''});
        procesadas++;if(procesadas===files.length)renderFotosEv();
      };img.src=e.target.result;
    };reader.readAsDataURL(file);
  });input.value='';
}

    _evFotos.forEach((f,i)=>{if(f.tipo!=='antes')return;html+=`<div class="foto-card">${f.dataUrl?`<img src="${f.dataUrl}" style="width:100%;height:95px;object-fit:cover;">`:f.driveUrl?`<a href="${f.driveUrl}" target="_blank" style="display:flex;align-items:center;justify-content:center;height:95px;background:var(--s2);color:var(--accent2);font-size:11px;text-decoration:none;">🔗 Ver en Drive</a>`:`<div style="height:95px;display:flex;align-items:center;justify-content:center;background:var(--s2);color:var(--text3);font-size:11px;">Sin vista previa</div>`}<span class="foto-tipo antes">ANTES</span><button class="foto-del" onclick="eliminarFoto(${i})">×</button><input class="foto-desc-input" type="text" placeholder="Descripción (opcional)" value="${f.descripcion||''}" oninput="_evFotos[${i}].descripcion=this.value.toUpperCase()"></div>`;});html+='</div>';}
  if(fd.length){html+=`<div style="font-size:10px;font-weight:700;color:#3fb950;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;">DESPUÉS — ${fd.length} foto${fd.length!==1?'s':''}</div><div class="foto-grid">`;
    _evFotos.forEach((f,i)=>{if(f.tipo!=='despues')return;html+=`<div class="foto-card">${f.dataUrl?`<img src="${f.dataUrl}" style="width:100%;height:95px;object-fit:cover;">`:f.driveUrl?`<a href="${f.driveUrl}" target="_blank" style="display:flex;align-items:center;justify-content:center;height:95px;background:var(--s2);color:var(--accent2);font-size:11px;text-decoration:none;">🔗 Ver en Drive</a>`:`<div style="height:95px;display:flex;align-items:center;justify-content:center;background:var(--s2);color:var(--text3);font-size:11px;">Sin vista previa</div>`}<span class="foto-tipo despues">DESPUÉS</span><button class="foto-del" onclick="eliminarFoto(${i})">×</button><input class="foto-desc-input" type="text" placeholder="Descripción (opcional)" value="${f.descripcion||''}" oninput="_evFotos[${i}].descripcion=this.value.toUpperCase()"></div>`;});html+='</div>';}
  el.innerHTML=html;

  if(fotosNuevas.length>0){
    showToast('Subiendo '+fotosNuevas.length+' foto(s) nueva(s) a Drive...','ok');
    try{
      const fotosConTimestamp=fotosNuevas.map((f,i)=>({...f,nombreArchivo:f.tipo.toUpperCase()+'_'+new Date().getTime()+'_'+String(i+1).padStart(2,'0')+'.jpg'}));
      const body=JSON.stringify({action:'subirFotos',ticketId:_evId,fotos:fotosConTimestamp,descripcionGeneral:desc});
      const resp=await fetch(API_URL,{method:'POST',body,headers:{'Content-Type':'text/plain'}});
      const resEv=await resp.json();
      if(resEv.ok){
        const nuevasConUrl=resEv.data.resultados.map((r,i)=>({tipo:r.tipo,dataUrl:fotosNuevas[i]?fotosNuevas[i].dataUrl:'',driveUrl:r.url||'',fileId:r.fileId||'',descripcion:r.descripcion||(fotosNuevas[i]?fotosNuevas[i].descripcion:'')||''}));
        fotasFinales=[...fotosExistentes,...nuevasConUrl];showToast('✓ '+resEv.data.fotosSubidas+' foto(s) subidas a Drive','ok');
      }else{throw new Error(resEv.error||'Error desconocido');}
    }catch(e){
      showToast('Error Drive: '+e.message,'err');
      const nuevasLocal=fotosNuevas.map(f=>({...f,driveUrl:'',fileId:''}));
      fotasFinales=[...fotosExistentes,...nuevasLocal];
    }
  }else{showToast('Sin fotos nuevas — actualizando descripciones...','ok');}
  fotasFinales.sort((a,b)=>{if(a.tipo==='antes'&&b.tipo==='despues')return -1;if(a.tipo==='despues'&&b.tipo==='antes')return 1;return 0;});
  t.evidencia={fotos:fotasFinales,descripcionGeneral:desc,fecha:now(),tecnico:session.name,carpetaDrive:'CSCO Evidencias/'+_evId};
  const n=nota('tecnico','Evidencia: '+fotasFinales.length+' foto(s) — '+fotosNuevas.length+' nueva(s).',session.name);
  t.notas.push(n);
  await apiPost({action:'actualizarTicket',ticket:t});await apiPost({action:'agregarNota',ticketId:_evId,nota:n});
  showToast('Evidencia guardada','ok');if(activePage==='tickets')renderTickets();closeModal();openModal(_evId);
}

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;"><div style="background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:16px;"><div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;">Ritmo y semáforo</div><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;"><span class="semaforo ${sc}" style="width:14px;height:14px;"></span><span style="font-size:14px;font-weight:600;color:${scolor};">${st}</span></div><div style="font-size:12px;color:var(--text2);line-height:1.8;">Ritmo pactado: <strong>${p.ritmo} ${p.unidadRitmo}</strong><br>Semanas restantes: <strong>${semsR}</strong><br>Pendientes: <strong>${sucP}</strong><br>Ritmo necesario: <strong style="color:${ritN>p.ritmo?'var(--danger2)':'#3fb950'};">${ritN} ${p.unidadRitmo}</strong></div></div><div style="background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:16px;"><div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;">Datos del proyecto</div><div style="font-size:12px;color:var(--text2);line-height:1.8;">Inicio: <strong>${p.fechaInicio}</strong><br>Fin: <strong>${p.fechaFin}</strong><br>Contacto: <strong>${p.contacto||'—'}</strong><br>${p.contactoTel?`Tel/Correo: <strong>${p.contactoTel}</strong><br>`:''  }${p.notas?`<span style="color:var(--text3);font-size:11px;">${p.notas}</span>`:''  }</div></div></div>
  <div style="background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:20px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><div style="font-size:12px;font-weight:600;">Avance general</div><div style="font-size:13px;font-weight:600;font-family:var(--mono);color:var(--accent2);">${pct}%</div></div><div class="proy-progress" style="height:10px;"><div class="proy-progress-bar" style="width:${pct}%;height:10px;"></div></div></div>
  ${session.role==='supervisor'?`<div style="background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:20px;"><div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;">Agregar sucursal</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;align-items:end;"><div class="fg" style="margin-bottom:0;"><label>ID</label><input type="text" id="add-suc-id" placeholder="Ej: KFC-200"></div><div class="fg" style="margin-bottom:0;"><label>Nombre</label><input type="text" id="add-suc-nombre" placeholder="Nombre de la sucursal"></div><div class="fg" style="margin-bottom:0;"><label>Dirección</label><input type="text" id="add-suc-dir" placeholder="Ciudad / referencia"></div><button class="btn btn-ok btn-sm" onclick="agregarSucursalProyecto('${p.id}')" style="height:36px;margin-top:18px;">Agregar</button></div></div>`:''  }
  <div style="background:var(--s1);border:1px solid var(--border);border-radius:8px;overflow:hidden;"><div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;"><div style="font-size:13px;font-weight:600;">Sucursales del proyecto</div><div style="display:flex;gap:6px;"><span class="badge b-pendiente">Pendiente</span><span class="badge b-programada">Programada</span><span class="badge b-ejecutada">Ejecutada</span><span class="badge b-documentada">Documentada ✓</span></div></div><div style="overflow-x:auto;"><table class="suc-table"><thead><tr><th>ID</th><th>Nombre</th><th>Dirección</th><th>Estatus</th><th>Fecha prog.</th><th>Técnico</th><th>Expediente</th><th></th></tr></thead><tbody>${sr}</tbody></table></div></div>`;
}
async function toggleEstatusProy(id){const p=proyectos.find(x=>x.id===id);if(!p)return;p.estatus=p.estatus==='Activo'?'Pausado':'Activo';await apiPost({action:'actualizarProyecto',proy:p});showToast('Proyecto '+p.estatus,'ok');renderDetalleProyecto(id);}
async function agregarSucursalProyecto(proyId){const p=proyectos.find(x=>x.id===proyId);if(!p)return;const id=document.getElementById('add-suc-id').value.trim().toUpperCase();const n=document.getElementById('add-suc-nombre').value.trim().toUpperCase();const d=document.getElementById('add-suc-dir').value.trim().toUpperCase();if(!id&&!n){showToast('Ingresa ID o nombre','err');return;}const suc={id:id||('SUC-'+String(p.sucursales.length+1).padStart(3,'0')),nombre:n||id,dir:d,estatus:'Pendiente',fechaProg:'',tecnico:'',tecnicoName:'',expediente:false,notas:''};const res=await apiPost({action:'agregarSucursal',data:{proyId,sucursal:suc}});if(res.ok){p.sucursales.push(suc);showToast('Sucursal agregada','ok');}else showToast('Error: '+res.error,'err');renderDetalleProyecto(proyId);}
async function cancelarSucursal(proyId,idx){const p=proyectos.find(x=>x.id===proyId);if(!p)return;if(!confirm('¿Cancelar "'+p.sucursales[idx].nombre+'"?'))return;p.sucursales[idx].estatus='Cancelada';await apiPost({action:'actualizarSucursal',data:{proyId,idx,sucursal:p.sucursales[idx]}});showToast('Sucursal cancelada','ok');renderDetalleProyecto(proyId);}
async function cambiarEstatusSuc(proyId,idx,nuevo){const p=proyectos.find(x=>x.id===proyId);if(!p)return;p.sucursales[idx].estatus=nuevo;await apiPost({action:'actualizarSucursal',data:{proyId,idx,sucursal:p.sucursales[idx]}});}
async function cambiarFechaSuc(proyId,idx,fecha){const p=proyectos.find(x=>x.id===proyId);if(!p)return;p.sucursales[idx].fechaProg=normFecha(fecha);if(fecha&&p.sucursales[idx].estatus==='Pendiente')p.sucursales[idx].estatus='Programada';const res=await apiPost({action:'actualizarSucursal',data:{proyId,idx,sucursal:p.sucursales[idx]}});if(res.ok)showToast('Fecha guardada','ok');else showToast('Error: '+res.error,'err');}
async function asignarTecnicoSuc(proyId,idx){const p=proyectos.find(x=>x.id===proyId);if(!p)return;const num=document.getElementById('tec-suc-num-'+proyId+'-'+idx).value.trim().toUpperCase();const nom=document.getElementById('tec-suc-nom-'+proyId+'-'+idx).value.trim().toUpperCase();if(!num&&!nom){showToast('Ingresa número o nombre','err');return;}p.sucursales[idx].tecnico=num;p.sucursales[idx].tecnicoName=nom;await apiPost({action:'actualizarSucursal',data:{proyId,idx,sucursal:p.sucursales[idx]}});showToast('Técnico asignado: '+nom,'ok');}
async function toggleExpediente(proyId,idx,val){const p=proyectos.find(x=>x.id===proyId);if(!p)return;p.sucursales[idx].expediente=val;if(val&&p.sucursales[idx].estatus==='Ejecutada'){p.sucursales[idx].estatus='Documentada';showToast('Sucursal Documentada','ok');}await apiPost({action:'actualizarSucursal',data:{proyId,idx,sucursal:p.sucursales[idx]}});}
function abrirModalOT(proyId){
  const p=proyectos.find(x=>x.id===proyId);if(!p)return;
  p.sucursales.forEach(s=>{if(s.fechaProg&&typeof s.fechaProg!=='string'){const d=new Date(s.fechaProg);s.fechaProg=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}else if(s.fechaProg&&s.fechaProg.includes('/')){const[dd,mm,yyyy]=s.fechaProg.split('/');s.fechaProg=yyyy+'-'+mm.padStart(2,'0')+'-'+dd.padStart(2,'0');}});
  const fechas=[...new Set(p.sucursales.filter(s=>s.fechaProg&&s.estatus!=='Cancelada').map(s=>s.fechaProg))].sort();
  const opF=fechas.length?fechas.map(f=>`<option value="${f}">${fmtFecha(f)}</option>`).join(''):'<option value="">— Sin fechas programadas —</option>';
  document.getElementById('modal-box').innerHTML=`<div class="modal-hdr"><div><h3>Generar OT de Jornada</h3><div class="modal-folio">${p.id} · ${p.cliente} — ${p.nombre}</div></div><button class="btn-cls" onclick="closeModal()">×</button></div><div class="modal-body"><div class="fg"><label>Selecciona la jornada (fecha)</label><select id="ot-fecha-sel" onchange="previsualizarOT('${proyId}',this.value)" style="text-transform:none!important;"><option value="">— Selecciona una fecha —</option>${opF}</select></div><div id="ot-preview"></div><div style="margin-top:16px;display:flex;gap:8px;"><button class="btn btn-purple" onclick="imprimirOTJornada('${proyId}')">🖨 Imprimir OT</button><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button></div></div>`;
  document.getElementById('overlay').classList.add('open');
}
function fmtFecha(f){if(!f)return'—';const[y,m,d]=f.split('-');const dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'],meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];const dt=new Date(y,m-1,d);return dias[dt.getDay()]+' '+d+' de '+meses[m-1]+' de '+y;}
function previsualizarOT(proyId,fecha){const p=proyectos.find(x=>x.id===proyId);if(!p)return;const el=document.getElementById('ot-preview');if(!el)return;if(!fecha){el.innerHTML='';return;}const sucs=p.sucursales.filter(s=>s.fechaProg===fecha&&s.estatus!=='Cancelada');if(!sucs.length){el.innerHTML='<div style="color:var(--text3);font-size:12px;text-align:center;padding:16px;">Sin sucursales para esta fecha</div>';return;}el.innerHTML=`<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:8px;"><div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;">${sucs.length} sucursal(es) para ${fmtFecha(fecha)}</div>${sucs.map(s=>`<div style="border:1px solid var(--border);border-radius:6px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;"><div style="flex:1;"><div style="font-weight:600;font-size:13px;">${s.nombre}</div><div style="font-size:11px;color:var(--text2);">${s.id}${s.dir?' · '+s.dir:''}</div></div><div style="font-size:11px;color:var(--text3);">${s.tecnicoName||'Sin técnico'}</div></div>`).join('')}</div>`;}
function imprimirOTJornada(proyId){
  const p=proyectos.find(x=>x.id===proyId);if(!p)return;const fecha=document.getElementById('ot-fecha-sel').value;if(!fecha){showToast('Selecciona una fecha','err');return;}
  const sucs=p.sucursales.filter(s=>s.fechaProg===fecha&&s.estatus!=='Cancelada');if(!sucs.length){showToast('Sin sucursales para esta fecha','err');return;}
  showToast('Generando PDF...','ok');const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'letter'});
  const pageW=215.9,margin=15,contentW=pageW-margin*2;let y=margin;const negro=[0,0,0],gris=[80,80,80],grisCla=[160,160,160];
  const hline=(yy)=>{doc.setDrawColor(0);doc.setLineWidth(0.3);doc.line(margin,yy,pageW-margin,yy);};const col1=margin,col2=margin+contentW/2;
  doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(...negro);doc.text('CENTRO DE SERVICIOS EN COMUNICACION S.A. DE C.V.',margin,y+5);
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(...gris);doc.text('Nubia #112, Col. Claveria, Azcapotzalco, CDMX  |  Tel. 49973448  |  www.csco.mx',margin,y+10);
  doc.setFontSize(16);doc.setFont('helvetica','bold');doc.setTextColor(...negro);doc.text('ORDEN DE TRABAJO',pageW-margin,y+5,{align:'right'});
  doc.setFontSize(10);const fj=p.id+'-'+fecha.replace(/-/g,'');doc.text(fj,pageW-margin,y+12,{align:'right'});
  y+=15;hline(y);y+=4;doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(...gris);doc.text('Proyecto: '+p.id,margin,y);doc.text('Emitida: '+now(),pageW-margin,y,{align:'right'});y+=6;
  if(p.notas){hline(y);y+=4;doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(...negro);doc.text('INDICACIONES GENERALES:',margin,y);doc.setFont('helvetica','normal');const nl=doc.splitTextToSize(p.notas,contentW-42);doc.text(nl,margin+43,y);y+=Math.max(5,nl.length*4)+2;}
  hline(y);y+=3;doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(...negro);doc.text('DATOS DEL PROYECTO Y JORNADA',margin,y+4);y+=7;hline(y);y+=3;doc.setFontSize(7);
  [['EMPRESA / CLIENTE',p.cliente,'TIPO DE PROYECTO',p.tipo],['NOMBRE DEL PROYECTO',p.nombre.substring(0,38),'FOLIO PROYECTO',p.id],['CONTACTO CLIENTE',p.contacto||'—','TEL / CORREO',p.contactoTel||'—'],['FECHA DE JORNADA',fmtFecha(fecha),'GENERADO POR',session.name]].forEach(([l1,v1,l2,v2])=>{doc.setFont('helvetica','bold');doc.setTextColor(...gris);doc.text(l1,col1,y);doc.text(l2,col2,y);y+=4;doc.setFont('helvetica','normal');doc.setTextColor(...negro);doc.text(String(v1).substring(0,38),col1,y);doc.text(String(v2).substring(0,32),col2,y);y+=5;});
  doc.setFont('helvetica','bold');doc.setTextColor(...gris);doc.text('HORA DE INICIO',col1,y);doc.text('HORA DE TERMINO',col2,y);y+=4;doc.line(col1,y,col1+50,y);doc.line(col2,y,col2+50,y);y+=6;
  hline(y);y+=3;doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(...negro);doc.text('SUCURSALES A VISITAR EN ESTA JORNADA',margin,y+4);y+=7;hline(y);y+=2;
  doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(...gris);doc.text('✓',margin+2,y+3);doc.text('#',margin+10,y+3);doc.text('ID SUCURSAL',margin+18,y+3);doc.text('NOMBRE',margin+55,y+3);doc.text('DIRECCIÓN',margin+120,y+3);y+=5;hline(y);y+=1;
  sucs.forEach((s,idx)=>{if(y>240){doc.addPage();y=margin;}doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(...grisCla);doc.setLineWidth(0.4);doc.rect(margin+1,y+1,5,5);doc.text(String(idx+1),margin+11,y+5,{align:'center'});doc.setTextColor(...negro);doc.text(String(s.id||'').substring(0,14),margin+18,y+5);doc.text(String(s.nombre||'').substring(0,28),margin+55,y+5);doc.setTextColor(...grisCla);doc.text(String(s.dir||'—').substring(0,30),margin+120,y+5);doc.line(margin,y+7,pageW-margin,y+7);y+=7;});y+=4;
  if(y>210){doc.addPage();y=margin;}hline(y);y+=3;doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(...negro);doc.text('MATERIALES Y EQUIPO',margin,y+4);y+=7;hline(y);y+=2;
  doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(...gris);doc.text('#',margin+3,y+3);doc.text('MATERIAL / EQUIPO',margin+12,y+3);doc.text('NO. SERIE / PARTE',margin+120,y+3);doc.text('CANT',margin+170,y+3);y+=5;hline(y);y+=1;
  for(let r=1;r<=5;r++){doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(...grisCla);doc.text(String(r),margin+4,y+5,{align:'center'});doc.line(margin+8,y,margin+8,y+7);doc.line(margin+115,y,margin+115,y+7);doc.line(margin+165,y,margin+165,y+7);doc.line(margin,y+7,pageW-margin,y+7);y+=7;}y+=4;
  if(y>220){doc.addPage();y=margin;}hline(y);y+=3;doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(...negro);doc.text('OBSERVACIONES DEL TÉCNICO',margin,y+4);y+=7;hline(y);y+=14;hline(y);y+=4;
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(...negro);doc.text('Todas las sucursales completadas:  SI [  ]   NO [  ]',margin,y);y+=8;
  hline(y);y+=3;const fw=contentW/3;
  ['ELABORO / SUPERVISOR','TÉCNICO RESPONSABLE','RECIBIDO CONFORME'].forEach((f,i)=>{const fx=margin+fw*i;doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(...gris);doc.text(f,fx+2,y+3);doc.setFont('helvetica','normal');doc.setTextColor(...grisCla);doc.text('Nombre:',fx+2,y+10);doc.line(fx+16,y+10,fx+fw-3,y+10);doc.text('Firma:',fx+2,y+18);doc.line(fx+14,y+18,fx+fw-3,y+18);if(i===2){doc.text('Sucursal:',fx+2,y+26);doc.line(fx+18,y+26,fx+fw-3,y+26);doc.text('Fecha:',fx+2,y+33);doc.line(fx+14,y+33,fx+fw-3,y+33);}else{doc.text('Fecha:',fx+2,y+26);doc.line(fx+14,y+26,fx+fw-3,y+26);}if(i<2){doc.setDrawColor(180);doc.line(fx+fw-1,y,fx+fw-1,y+36);doc.setDrawColor(0);}});y+=38;
  hline(y);y+=3;doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(...grisCla);doc.text('FOR-003  Rev.01  |  SGC ISO 9001:2015  |  CSCO',margin,y+3);doc.text('Generada: '+now(),pageW-margin,y+3,{align:'right'});
  doc.save(fj+'.pdf');showToast('PDF '+fj+'.pdf descargado','ok');closeModal();
}
tickets=[];folioNum=1;
</script>
